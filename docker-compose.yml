version: "3.9"

services:
  prism-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prism-api
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - HF_CACHE_DIR=/app/.prism/models
    volumes:
      - prism_model_cache:/app/.prism/models
      - ./backend/.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Phase 5: Vector DB for Prism Agent memory
  # qdrant:
  #   image: qdrant/qdrant:v1.7.4
